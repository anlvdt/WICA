# AntiGravity Agent Configuration

# === LLM Providers (thứ tự ưu tiên) ===
# USB portable: ưu tiên cloud API miễn phí (không cần cài gì trên máy đích)
# Chỉ cần internet là đủ.

llm_providers:
  # 1. Groq - miễn phí, cực nhanh, KHÔNG cần cài gì
  #    Lấy API key tại: https://console.groq.com/keys
  - name: "groq"
    base_url: "https://api.groq.com/openai/v1"
    api_key: "env:GROQ_API_KEY"  # ← Đặt biến môi trường GROQ_API_KEY hoặc điền trực tiếp
    model: "llama-3.1-8b-instant"

  # 2. NVIDIA NIM - miễn phí 1000 req/ngày, KHÔNG cần cài gì
  #    Lấy API key tại: https://build.nvidia.com/
  - name: "nvidia"
    base_url: "https://integrate.api.nvidia.com/v1"
    api_key: "env:NVIDIA_API_KEY"  # ← Đặt biến môi trường NVIDIA_API_KEY hoặc điền trực tiếp
    model: "meta/llama-3.1-8b-instruct"

  # 3. Ollama - offline, cần cài Ollama + pull model trên máy đích
  - name: "ollama"
    base_url: "http://localhost:11434/v1"
    api_key: "ollama"
    model: "llama3.1:8b"

