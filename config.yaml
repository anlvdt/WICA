# === Profiles - Hồ sơ cài đặt nhanh ===
# Mỗi profile chứa danh sách actions sẽ chạy tuần tự.
# Gõ "chạy profile <tên>" để thực hiện.
# Tự thêm/sửa profile theo nhu cầu.

profiles:
  mac_dinh:
    name: "Cài đặt máy mới"
    actions:
      # === BƯỚC 1: Chuẩn bị hệ thống ===
      - {type: system_config, config: uac_off}
      - {type: remove_bloatware}
      - {type: clean_start_menu}
      # === BƯỚC 2: Cấu hình hệ thống (all users) ===
      - {type: system_config, config: timezone_SE_Asia_Standard_Time}
      - {type: system_config, config: date_dmy}
      - {type: system_config, config: show_file_ext}
      - {type: system_config, config: disable_task_view}
      - {type: system_config, config: search_icon_only}
      - {type: system_config, config: unpin_store_taskbar}
      - {type: system_config, config: disable_notifications}
      - {type: system_config, config: disable_tips}
      - {type: system_config, config: disable_bing_search}
      - {type: system_config, config: disable_copilot}
      - {type: system_config, config: disable_telemetry}
      # === BƯỚC 3: Cài phần mềm online (winget) ===
      - {type: install, package: chrome}
      - {type: install, package: 7zip}
      - {type: install, package: acrobat}
      - {type: install, package: ultraviewer}
      - {type: install, package: "vc++ x64"}
      - {type: install, package: "vc++ x86"}
      - {type: install, package: citrix}
      - {type: install, package: "edge webview2"}
      - {type: install, package: connecttunnel}
      - {type: install, package: "office 365"}
      - {type: install, package: teams}
      # === BƯỚC 4: Deploy portable + copy files ===
      - {type: deploy_portable, source: "TeamViewerQS_x64.exe", dest: "C:\\Tools\\TeamViewerQS", name: "TeamViewer QS"}
      - {type: deploy_portable, source: "unikey46RC2-230919-win64", dest: "C:\\Tools\\UniKey", name: "UniKey", exe: "UniKeyNT.exe"}
      - {type: copy_to_all_users, source: "profiles.xml", dest_relative: "AppData\\Local\\SonicWall\\SnwlConnect\\Documents"}
      - {type: install_fonts, source: "VNI"}
      # === BƯỚC 5: Cài từ file local ===
      - {type: install_local, path: "LocalOffice_Agent-2310.exe"}
      - {type: install_local, path: "trendmicro_agent_cloud_x64.msi"}
      # === BƯỚC 6: Bật lại UAC ===
      - {type: system_config, config: uac_on}

  thue:
    name: "Cài phần mềm Thuế (bản thường)"
    actions:
      - {type: install_htkk, path: "PMThue\\HTKK.rar", dll: false}
      - {type: install_tax, path: "PMThue\\iTaxViewer.zip", shortcut: "iTaxViewer"}
      - {type: install_tax, path: "PMThue\\CTSigningHub.rar", shortcut: "CT SigningHub"}

  thue_dll:
    name: "Cài phần mềm Thuế (bản DLL - dữ liệu lớn)"
    actions:
      - {type: install_htkk, path: "PMThue\\HTKK_DLL.rar", dll: true}
      - {type: install_tax, path: "PMThue\\iTaxViewer_dll.zip", shortcut: "iTaxViewer"}
      - {type: install_tax, path: "PMThue\\CTSigningHub.rar", shortcut: "CT SigningHub"}

  go_thue:
    name: "Gỡ phần mềm Thuế"
    actions:
      - {type: uninstall, package: "htkk"}
      - {type: uninstall, package: "itaxviewer"}
      - {type: uninstall, package: "ct signinghub"}

# === Quick Commands - Lệnh nhanh riêng lẻ ===
