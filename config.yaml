# Thư mục chứa file cài đặt local (thử lần lượt, dùng cái nào tồn tại)
local_paths:
  - "C:\\Ecom Softs"
  - "C:\\Temp\\SoftVN"
  - "C:\\SoftVN"
  - "C:\\Software"

